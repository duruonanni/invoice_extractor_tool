<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lenovo EaaS Invoice Validator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --brand:#E2231A;
  --brand-dk:#BE1915;
  --brand-lt:#FFF0EF;
  --ink:#171717;
  --ink-2:#4E444E;
  --ink-3:#787878;
  --ink-4:#AAAAAA;
  --bg:#F2F2F2;
  --surface:#FFFFFF;
  --surface-2:#F7F7F5;
  --border:#E0E0E0;
  --border-lt:#EFEFEF;
  --text:var(--ink);
  --text-dim:var(--ink-3);
  --accent:var(--brand);
  --accent-hover:var(--brand-dk);
  --accent-soft:var(--brand-lt);
  --green:#167c3b;
  --green-soft:#e7f5eb;
  --yellow:#9a6b00;
  --yellow-soft:#fff4da;
  --red:#bf2018;
  --red-soft:#fdeae8;
  --navy:#1A1A1A;
  --info:#0f5ea8;
  --info-soft:#e9f3ff;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Noto Sans","Helvetica Neue",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.45}
button,input,select,textarea,table,thead,tbody,tfoot,tr,th,td,summary{font:inherit}
button:focus-visible,.drop-zone:focus-visible,.tab:focus-visible,.st:focus-visible,.btn:focus-visible,.btn-s:focus-visible,.gc:focus-visible,.statement-toggle:focus-visible,.focus-chip:focus-visible,.issue-link:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.hdr{display:flex;align-items:center;gap:12px;padding:14px 24px;background:var(--navy);border-bottom:3px solid var(--accent);color:#fff}
.logo{width:34px;height:34px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700}
.ver{padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.12);font-size:11px}
.container{max-width:1280px;margin:0 auto;padding:24px}
.drop-zone{background:var(--surface);border:2px dashed var(--border);border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:.2s}
.drop-zone:hover,.drop-zone.dg{border-color:var(--accent);background:#fffafa}
.drop-zone .icon{font-size:28px;opacity:.7}
.drop-zone h3{margin:8px 0 4px;font-size:18px}
.drop-zone p{margin:0;color:var(--text-dim)}
.drop-zone input{display:none}
.fl{display:flex;flex-direction:column;gap:8px;margin:16px 0}
.fi{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.fi-type{font-size:11px;font-weight:700;color:var(--text-dim)}
.fn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fs{font-size:11px;color:var(--text-dim)}
.lb{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.lb.det{background:var(--yellow-soft);color:var(--yellow)}
.lb.ok{background:var(--green-soft);color:var(--green)}
.lb.err{background:var(--red-soft);color:var(--red)}
.rb{border:none;background:none;color:var(--text-dim);cursor:pointer;font-size:16px}
.acts{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 20px}
.btn{border:1px solid var(--border);background:var(--surface);color:var(--text);padding:9px 14px;border-radius:10px;cursor:pointer;font-weight:600}
.btn:hover:not(:disabled){background:var(--surface-2)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.btn-p:hover:not(:disabled){background:var(--accent-hover)}
.pw{display:none;margin:0 0 18px}
.pb{height:6px;background:var(--surface-2);border-radius:999px;overflow:hidden}
.pf{height:100%;width:0;background:var(--accent);transition:width .2s}
.pt{margin-top:6px;color:var(--text-dim);font-size:12px}
.gcs{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.gc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;display:block;width:100%;text-align:left;font:inherit}
.gc.a{border-color:var(--accent);box-shadow:0 0 0 2px rgba(225,37,27,.08)}
.gc.issue-country{border-color:#efb4af;background:#fff6f5}
.gc-f{font-size:22px}
.gc-n{font-weight:700;margin:6px 0 8px}
.gc-r{display:flex;justify-content:space-between;color:var(--text-dim);margin-top:4px}
.gc-v.ok{color:var(--green)}
.gc-v.er{color:var(--red)}
.tabs,.stabs,.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 12px}
.tab,.st,.btn-s{border:1px solid var(--border);background:var(--surface);color:var(--text-dim);padding:7px 12px;border-radius:999px;cursor:pointer;font-size:12px;font-weight:600}
.tab.a,.st.a,.btn-s.a{background:var(--accent);border-color:var(--accent);color:#fff}
.tab.issue-country{border-color:#efb4af;background:#fff6f5;color:var(--red)}
.tab.issue-country.a{background:var(--red);border-color:var(--red);color:#fff}
.country-filter-strip{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0 8px;padding:10px 12px;border:1px solid #f1b4af;border-radius:12px;background:#fff5f4}
.country-filter-label{font-size:12px;font-weight:700;color:var(--red)}
.country-filter-btn{border-color:#f1b4af;background:#fff;color:var(--red)}
.country-filter-btn:hover{background:#fff3f1}
.tp,.sp{display:none}
.tp.a,.sp.a{display:block}
.bs{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin:0 0 16px;padding:16px 18px;border-radius:16px;border:1px solid var(--border);border-left:6px solid var(--border);background:var(--surface)}
.bs.success{background:var(--green-soft);border-color:#b9dfc4;border-left-color:var(--green)}
.bs.warning{background:var(--yellow-soft);border-color:#ecd89d;border-left-color:var(--yellow)}
.bs.error{background:var(--red-soft);border-color:#f2b8b2;border-left-color:var(--red)}
.bs-title{font-size:18px;font-weight:700}
.bs.success .bs-title{color:var(--green)}
.bs.warning .bs-title{color:var(--yellow)}
.bs.error .bs-title{color:var(--red)}
.bs-desc{margin-top:4px;color:var(--text)}
.bs-meta{margin-top:8px;color:var(--text-dim);font-size:12px}
.bs-side{white-space:nowrap;font-weight:700;font-size:12px;padding-top:2px}
.bs.success .bs-side{color:var(--green)}
.bs.warning .bs-side{color:var(--yellow)}
.bs.error .bs-side{color:var(--red)}
.country-section{margin-bottom:18px}
.statement-card{margin:20px 0 30px;border:1px solid var(--border);border-radius:18px;background:var(--surface);box-shadow:0 8px 24px rgba(17,24,79,.05);overflow:hidden}
.statement-card + .statement-card{margin-top:28px}
.statement-card.ok{border-left:6px solid var(--green)}
.statement-card.warn{border-left:6px solid var(--yellow)}
.statement-card.err{border-left:6px solid var(--red)}
.statement-card.focus-mode{box-shadow:0 12px 28px rgba(191,32,24,.10)}
.statement-body.collapsed{display:none}
.tw{background:var(--surface);border:1px solid var(--border);border-top:none;overflow:auto}
.tb{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:var(--surface-2);border:1px solid var(--border);padding:10px 12px}
.statement-card .tb{padding:14px 16px;background:linear-gradient(180deg,#f7f9fc 0%, #f0f2f5 100%);border:none;border-bottom:1px solid var(--border)}
.statement-main{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.statement-num{font-size:24px;font-weight:800;letter-spacing:.01em;color:var(--navy)}
.statement-pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;background:#fff;border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text-dim)}
.statement-meta{display:flex;flex-wrap:wrap;gap:10px 14px}
.tb-meta{margin-left:10px;color:var(--text-dim);font-size:12px}
.statement-card .tb-meta{margin-left:0}
.statement-card > details,.statement-card > .tw,.statement-card > .ib{margin-left:14px;margin-right:14px}
.statement-card > details:last-child{margin-bottom:14px}
.issue-stack{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.issue-badge{display:inline-flex;align-items:center;justify-content:center;min-width:94px;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:800}
.issue-badge.ok{background:var(--green-soft);color:var(--green)}
.issue-badge.warn{background:var(--yellow-soft);color:var(--yellow)}
.issue-badge.err{background:var(--red-soft);color:var(--red)}
.issue-badge.neutral{background:var(--surface-2);color:var(--text-dim)}
.issue-link{border:none;cursor:pointer}
.statement-toggle{display:inline-flex;align-items:center;justify-content:center;min-width:90px;padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--navy);font-size:12px;font-weight:800;cursor:pointer}
.statement-toggle:hover,.issue-link:hover{filter:brightness(.98)}
.statement-focus-strip{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#fff7e6 0%, #fffdf8 100%)}
.statement-focus-copy{display:flex;flex-direction:column;gap:4px}
.statement-focus-copy strong{font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--red)}
.statement-focus-copy span{color:var(--text-dim);font-size:12px}
.statement-focus-actions{display:flex;gap:8px;flex-wrap:wrap}
.focus-chip{border:1px solid #f3b7b2;background:#fff;color:var(--red);padding:7px 12px;border-radius:999px;cursor:pointer;font-size:12px;font-weight:800}
.focus-chip:hover{background:#fff5f4}
.focus-chip.secondary{border-color:var(--border);color:var(--navy)}
table{width:100%;border-collapse:collapse}
th,td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
th{background:var(--navy);color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0}
.payment-term-head{background:var(--info);color:#fff}
.payment-term-cell{background:var(--info-soft);color:var(--info);font-weight:600}
.cell-pass{color:var(--green);font-weight:700}
.cell-fail{color:var(--red);font-weight:700}
.wrap{white-space:normal;min-width:220px}
.tc{text-align:center}
.tr{text-align:right}
.mono{font-family:"SFMono-Regular",Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
.ro td{background:var(--accent-soft)}
.ra td{background:var(--yellow-soft)}
.row-focus td{background:#fff1bf !important;box-shadow:inset 0 1px 0 #f0c419,inset 0 -1px 0 #f0c419}
.tg{color:var(--green)}
.tre{color:var(--red)}
.td{color:var(--text-dim)}
.btn-s.btn-focus{background:#fff3f1;border-color:#f1b4af;color:var(--red)}
.btn-s.btn-focus.a{background:var(--red);border-color:var(--red);color:#fff}
.btn-s.btn-show-all{background:#f5f5f5;border-color:var(--border);color:var(--text)}
.btn-s.btn-show-all.a{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-s.btn-err-invoice{border-color:#f1b4af;background:#fff5f4;color:var(--red)}
.btn-s.btn-err-invoice.a{background:var(--red);border-color:var(--red);color:#fff}
details{margin-top:12px}
summary{cursor:pointer;font-weight:700;margin-bottom:8px}
.validation-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:0 12px}
.vi{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.vi:last-child{border-bottom:none}
.vi-f{scroll-margin-top:120px}
.vc{min-width:46px;text-align:center;border-radius:999px;padding:4px 6px;font-size:11px;font-weight:700}
.vc.p{background:var(--green-soft);color:var(--green)}
.vc.f{background:var(--red-soft);color:var(--red)}
.vc.w{background:var(--yellow-soft);color:var(--yellow)}
.ib{padding:12px 14px;border-radius:12px;background:var(--yellow-soft);color:var(--yellow)}
.ib.w{margin:10px 0}
@media (max-width:800px){
  .container{padding:16px}
  .drop-zone{padding:28px 14px}
  .bs{flex-direction:column}
  .bs-side{white-space:normal}
  .statement-num{font-size:20px}
  .statement-main{align-items:flex-start}
  .statement-focus-strip{padding:12px 14px}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">L</div>
  <div>
    <div style="font-weight:700;font-size:18px">Lenovo EaaS Invoice Validator</div>
  </div>
  <div class="ver" id="verTag"></div>
</div>
<div class="container">
  <div class="drop-zone" id="dz">
    <div class="icon">PDF</div>
    <h3 data-t="drop_title">Drop Lenovo EaaS invoice PDFs here, or click to select</h3>
    <p data-t="drop_sub">Supports 31 Sales Orgs across 25 countries (AT/AU/BE/CA/CH/DE/ES/FR/GB/GR/HK/IE/IN/IT/JP/KR/MY/NL/NZ/PH/PT/SE/SG/TH/US) - Multiple files allowed</p>
    <input type="file" id="fIn" accept=".pdf" multiple>
  </div>
  <div class="fl" id="fList"></div>
  <div class="acts" id="aBar" style="display:none">
    <button class="btn btn-p" id="runBtn" onclick="runAll()" disabled data-t="run_btn">Run Verification</button>
    <button class="btn" id="exBtn" onclick="doExport()" style="display:none" data-t="export_btn">Export Excel</button>
    <button class="btn" onclick="clearAll()" data-t="clear_btn">Clear All</button>
  </div>
  <div class="pw" id="pw">
    <div class="pb"><div class="pf" id="pbar"></div></div>
    <div class="pt" id="plab"></div>
  </div>
  <div id="gSum" style="display:none">
    <div style="font-size:11px;font-weight:700;color:var(--text-dim);margin-bottom:8px" data-t="results_by">Results by Country / Region</div>
    <div class="gcs" id="gCards"></div>
  </div>
  <div id="results"></div>
</div>
<script>/*__SCRIPT__*/</script>
</body>
</html>
