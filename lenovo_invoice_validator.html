const CM={AT:{flag:'AT',label:'Austria',cur:'EUR'},AU:{flag:'AU',label:'Australia',cur:'AUD'},BE:{flag:'BE',label:'Belgium',cur:'EUR'},CA:{flag:'CA',label:'Canada',cur:'CAD'},CH:{flag:'CH',label:'Switzerland',cur:'CHF'},DE:{flag:'DE',label:'Germany',cur:'EUR'},ES:{flag:'ES',label:'Spain',cur:'EUR'},FR:{flag:'FR',label:'France',cur:'EUR'},GB:{flag:'GB',label:'United Kingdom',cur:'GBP'},GR:{flag:'GR',label:'Greece',cur:'EUR'},HK:{flag:'HK',label:'Hong Kong',cur:'HKD'},IE:{flag:'IE',label:'Ireland',cur:'EUR'},IN:{flag:'IN',label:'India',cur:'INR'},IT:{flag:'IT',label:'Italy',cur:'EUR'},JP:{flag:'JP',label:'Japan',cur:'JPY'},KR:{flag:'KR',label:'South Korea',cur:'KRW'},MY:{flag:'MY',label:'Malaysia',cur:'MYR'},NL:{flag:'NL',label:'Netherlands',cur:'EUR'},NZ:{flag:'NZ',label:'New Zealand',cur:'NZD'},PH:{flag:'PH',label:'Philippines',cur:'PHP'},PT:{flag:'PT',label:'Portugal',cur:'EUR'},SE:{flag:'SE',label:'Sweden',cur:'SEK'},SG:{flag:'SG',label:'Singapore',cur:'SGD'},TH:{flag:'TH',label:'Thailand',cur:'THB'},US:{flag:'US',label:'United States',cur:'USD'},OTHER:{flag:'OT',label:'Other',cur:'USD'}};

const pN=s=>s?parseFloat(String(s).replace(/,/g,''))||0:0;
function fc(n,c){
  const sym={JPY:'JPY ',EUR:'EUR ',GBP:'GBP ',CHF:'CHF ',SEK:'SEK ',KRW:'KRW ',INR:'INR ',MYR:'RM ',PHP:'PHP ',AUD:'$',NZD:'NZ$',CAD:'CA$',SGD:'S$',THB:'THB ',HKD:'HK$',USD:'$'};
  const s=sym[c]||'';const noD=c==='JPY'||c==='KRW';
  return s+(noD?Math.round(n).toLocaleString():n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}));
}
function fmtSz(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(0)+'KB';return(b/1048576).toFixed(1)+'MB'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function normText(t){
  return t
    .replace(/\u00e2\u201a\u00ac|\u20ac/g,'EUR')
    .replace(/\u00c2\u00a3|\u00a3/g,'GBP')
    .replace(/\u00c2\u00a5|\u00a5|\uffe5/g,'JPY')
    .replace(/\u20a9/g,'KRW');
}

function inferDisplayName(rawName, country, lines){
  const name=String(rawName||'');
  if(!/~\d+\.pdf$/i.test(name))return name;
  const hd=parseHeader(lines||[]);
  const stmt=hd.stmtNum||'';
  const langMap={JP:'JA',KR:'KO'};
  const lang = langMap[country]||'EN';
  if(stmt&&country&&country!=='OTHER'){
    return `${country}_STMT_BRIM_STATEMENT_${stmt}_${lang}.PDF`;
  }
  return stmt||name;
}

async function pdfToLines(file){
  const buf=await file.arrayBuffer(),pdf=await pdfjsLib.getDocument({data:buf}).promise,out=[];
  for(let p=1;p<=pdf.numPages;p++){
    const pg=await pdf.getPage(p),c=await pg.getTextContent(),items=c.items.filter(x=>x.str.trim());
    if(!items.length)continue;
    const byY={};
    for(const it of items){const y=Math.round(it.transform[5]);if(!byY[y])byY[y]=[];byY[y].push({x:it.transform[4],str:it.str,w:it.width||0})}
    for(const y of Object.keys(byY).map(Number).sort((a,b)=>b-a)){
      const sorted=byY[y].sort((a,b)=>a.x-b.x);
      let text=sorted[0].str;
      for(let i=1;i<sorted.length;i++){
        const prev=sorted[i-1],curr=sorted[i];
        const gap=curr.x-(prev.x+Math.abs(prev.w));
        text+=(gap>1?' ':'')+curr.str;
      }
      text=normText(text);
      out.push({text,page:p});
    }
  }
  return out;
}

function detectCountry(text,fn){
  // Primary: filename pattern EPRE{XX}P (e.g. EPREATP, EPREUSP) or {XX}nn_ prefix
  const fm=fn.match(/EPRE([A-Z]{2})P/i)||fn.match(/^([A-Z]{2})\d+_/i);
  if(fm){const cc=fm[1].toUpperCase();if(CM[cc])return cc;}
  // Special: CLP prefix => HK
  if(fn.includes('CLP'))return'HK';
  // Fallback: content-based detection
  if(/\bJPY\b/.test(text))return'JP';
  if(/\bCHF\b/.test(text))return'CH';
  if(/\bHKD\b/.test(text))return'HK';
  if(/\bAUD\b/.test(text))return'AU';
  if(/\bTHB\b/.test(text))return'TH';
  if(/\bKRW\b/.test(text))return'KR';
  if(/\bINR\b/.test(text))return'IN';
  if(/\bRM\b/.test(text))return'MY';
  if(/\bSEK\b/.test(text))return'SE';
  if(/\bGBP\b/.test(text))return'GB';
  if(/\bEUR\b/.test(text))return'AT';
  if(/\bUSD\b/.test(text))return'US';
  return'OTHER';
}

function parseHeader(lines){
  const h={stmtNum:'',date:'',custName:'',custNum:'',period:''};
  for(let i=0;i<lines.length;i++){
    const ln=lines[i].text;
    if(!h.stmtNum){
      const m=ln.match(/Statement\s*Number[:\s]*([A-Z]{2,}\w{5,}|\d{6,})/i);
      if(m){
        if(!/^(Statement|Date|Customer)$/i.test(m[1]))h.stmtNum=m[1];
      }else if(/Statement\s*Number/i.test(ln)){
        for(let j=i+1;j<Math.min(i+4,lines.length);j++){
          const look=lines[j].text.trim();
          const lm=look.match(/\b([A-Z]{2,}\w{5,}|\d{6,})\b/);
          if(lm){h.stmtNum=lm[1];break}
        }
      }else{
        const sm=ln.match(/Statement\s*No\.?\s*:\s*([A-Z]{2,}\w{5,}|\d{6,})/i);
        if(sm&&!/^(Statement|Date|Customer)$/i.test(sm[1]))h.stmtNum=sm[1];
        const jm=ln.match(/明細書番号\s*([A-Z]{2,}\w{5,}|\d{6,})/);
        if(jm)h.stmtNum=jm[1];
      }
    }
    if(!h.date){
      const m=ln.match(/(?:Statement\s*Date|Date)[:\s]*([\d\/\.\-]+)/i);
      if(m){
        h.date=m[1];
      }else if(/Statement\s*Date/i.test(ln)){
        for(let j=i+1;j<Math.min(i+3,lines.length);j++){
          const look=lines[j].text.trim();
          const lm=look.match(/\b(\d{1,2}[\/.\-]\d{1,2}[\/.\-]\d{2,4})\b/);
          if(lm){h.date=lm[1];break}
        }
      }else{
        const dm=ln.match(/Date\s+of\s+Statement:\s*([\d\/\.\-]+)/i);
        if(dm)h.date=dm[1];
        const jm=ln.match(/明細書日付\s*([\d\/\.\-]+)/);
        if(jm)h.date=jm[1];
      }
    }
    if(!h.custNum){
      const m=ln.match(/(?:Customer\s*Number|Sold[\s-]*To)[:\s]*([\d]+)/i);
      if(m){
        if(!/D\.V\.R\./i.test(ln))h.custNum=m[1];
      }else if(/Customer\s*Number/i.test(ln)){
        for(let j=i+1;j<Math.min(i+3,lines.length);j++){
          const look=lines[j].text.trim();
          const lm=look.match(/\b(\d{6,})\b/);
          if(lm){h.custNum=lm[1];break}
        }
      }else{
        const jm=ln.match(/お客様番号\s*(\d{6,})/);
        if(jm)h.custNum=jm[1];
      }
    }
    if(!h.period){const m=ln.match(/(?:Billing\s*Period|Recurring\s*Charge\s*Period)[:\s]*(.+)/i);if(m)h.period=m[1].trim()}
    if(!h.period){
      const pm=ln.match(/請求対象期間\s*(.+)/);
      if(pm)h.period=pm[1].trim();
    }
    if(!h.custName){
      const nm=ln.match(/Name:\s*(.+?)(?:\s+Natural\s+of\s+Statement:|\s+Date\s+of\s+Statement:|$)/i);
      if(nm){
        let name=nm[1].trim();
        const next=(lines[i+1]?.text||'').trim();
        const nextName=next.match(/^([A-Z0-9&().,'\/ -]{2,}?)\s+(?:Natural\s+of\s+Statement:|Date\s+of\s+Statement:|PO\s+No:|Address:|State:|GSTIN|Bill\s+To\s+Country:|Remark:|$)/i);
        if(nextName&&nextName[1]&&!/^(Address|State|Remark|PO)$/i.test(nextName[1])){
          name=`${name} ${nextName[1].trim()}`.replace(/\s+/g,' ');
        }
        if(name&&!/^(Lenovo\s+\(India\)|Lenovo\s+Global\s+Technology\s+India)/i.test(name))h.custName=name;
      }else{
        const jm=ln.match(/お客様名\s*(.+)/);
        if(jm)h.custName=jm[1].trim();
      }
    }
  }
  for(let i=0;i<Math.min(lines.length,15);i++){
    const ln=lines[i].text.trim();
    if(/Statement\s*Number\s+Statement\s*Date\s+Customer\s*Number/i.test(ln)&&i+2<lines.length){
      const vals=lines[i+2].text.trim().match(/\b([A-Z]{2,}\w{5,})\b.*?\b(\d{1,2}[\/.\-]\d{1,2}[\/.\-]\d{2,4})\b.*?\b(\d{6,})\b/);
      if(vals){
        h.stmtNum=vals[1];
        if(!h.date)h.date=vals[2];
        h.custNum=vals[3];
      }
      break;
    }
  }
  for(let i=0;i<Math.min(lines.length,30);i++){
    if(/Sold[\s-]*To/i.test(lines[i].text)){
      for(let j=i+1;j<Math.min(i+6,lines.length);j++){
        const cl=lines[j].text.trim();
        if(cl&&!/^\d+$/.test(cl)&&!/^[A-Z]{2}$/.test(cl)&&cl.length>3&&!/^\d{5,}/.test(cl)&&!/Street|Dr |Ave |Road|Rd /i.test(cl)){h.custName=cl;break}
      }
      break;
    }
  }
  if(!h.custName)for(const{text:ln}of lines){const m=ln.match(/Customer\s*Name[:\s]*(.+)/i);if(m){h.custName=m[1].trim();break}}
  return h;
}

function parseBillingSummaryGeneric(text){
  const hasSummaryLabel = /(Billing\s*Summary|Summary\s*of\s*Charges|Statement\s*Summary|Summary\s*Charges|Summary\s*By|請求概要)/i.test(text);
  const res=[];let m;
  // US 5-col: inv $ charges $ tax $ CRF $ RDF $ total

  if(res.length)return res;
  // Currency symbol patterns: $ JPY/EUR/GBP/CHF/SEK/KRW/INR/RM

  while(hasSummaryLabel && (m=p3c.exec(text))!==null){

  // 3-col with suffix currency: inv charges CUR tax CUR total CUR
  const curSymS='(?:\\u20ac|\\u00a3|\\u00e2\\u201a\\u00ac|\\u0432\\u201a\\u00ac|SEK|GBP|EUR|CHF)';
  const p3cS=new RegExp('(\\d{7,12})\\s+([\\d,]+\\.?\\d*)\\s*'+curSymS+'\\s+([\\d,]+\\.?\\d*)\\s*'+curSymS+'\\s+([\\d,]+\\.?\\d*)\\s*'+curSymS,'g');
  while(hasSummaryLabel && (m=p3cS.exec(text))!==null){
    const[,num,c,tx,tot]=m;const ch=pN(c),t=pN(tx),tl=pN(tot);
    if(!res.find(r=>r.inv===num)&&Math.abs(tl-(ch+t))<tl*.02+10)
      res.push({inv:num,charges:ch,tax:t,total:tl,crf:0,rdf:0});
  }
  if(res.length)return res;
  // Plain 3-col (no symbol): inv charges tax total (PH, TH, etc.)
  const p3n=/(\d{7,12})\s+([\d,]+\.\d{2})\s+([\d,]+\.\d{2})\s+([\d,]+\.\d{2})/g;
  while(hasSummaryLabel && (m=p3n.exec(text))!==null){
    const[,num,c,tx,tot]=m;const ch=pN(c),t=pN(tx),tl=pN(tot);
    if(!res.find(r=>r.inv===num)&&Math.abs(tl-(ch+t))<tl*.02+10)

  }
  if(res.length)return res;
  // JP yen (integer): inv JPY charges JPY tax JPY total
  const pJP=/(\d{7,12})\s+JPY\s*([\d,]+)\s+JPY\s*([\d,]+)\s+JPY\s*([\d,]+)/g;
  while(hasSummaryLabel && (m=pJP.exec(text))!==null){
    const[,num,c,tx,tot]=m;const ch=pN(c),t=pN(tx),tl=pN(tot);
    if(!res.find(r=>r.inv===num)&&Math.abs(tl-(ch+t))<tl*.02+10)
      res.push({inv:num,charges:ch,tax:t,total:tl,crf:0,rdf:0});
  }
  if(res.length)return res;
  // KRW integer (no decimals): inv KRW charges KRW tax KRW total
  const pKR=/(\d{7,12})\s+KRW\s*([\d,]+)\s+KRW\s*([\d,]+)\s+KRW\s*([\d,]+)/g;
  while(hasSummaryLabel && (m=pKR.exec(text))!==null){
    const[,num,c,tx,tot]=m;const ch=pN(c),t=pN(tx),tl=pN(tot);
    if(!res.find(r=>r.inv===num)&&Math.abs(tl-(ch+t))<tl*.02+10)
      res.push({inv:num,charges:ch,tax:t,total:tl,crf:0,rdf:0});
  }
  // AU tranche-based: trancheID $charges $ tax $ total  (tranche IDs like 1216232138_AU_202512_M_48_006)
  if(!res.length){
    const auP=/(\d{7,12})\s+\$\s*([\d,]+\.?\d*)\s+\$\s*([\d,]+\.?\d*)\s+\$\s*([\d,]+\.?\d*)/g;
    while(hasSummaryLabel && (m=auP.exec(text))!==null){

        res.push({inv:num,charges:ch,tax:t,total:tl,crf:0,rdf:0});
    }
  }
  return res;
}

function parseBillingSummaryJP(lines){

// JP Parser
function parseItemsJP(lines,fileName){
  const items=[];let curInv='',curTr='';
  const reFull=/(.+?)\s+([\d,]+)\s+JPY\s*([\d,]+)\s+JPY\s*([\d,]+)\s+(\d+)\s*%\s+JPY\s*([\d,]+)\s+JPY\s*([\d,]+)/;
  const reNums=/^\s*([\d,]+)\s+JPY\s*([\d,]+)\s+JPY\s*([\d,]+)\s+(\d+)\s*%\s+JPY\s*([\d,]+)\s+JPY\s*([\d,]+)/;
  const sectRe=/Tranche\s*ID|Invoice\s*Number|Sub[\s-]*Total|Grand[\s-]*Total|Product\s*ID/i;
  const curRe=/JPY\s*[\d,]+/;
  const pidRe=/^([A-Za-z0-9][A-Za-z0-9_]{4,})\b/;
  function jpFwd(i,max){let s='';for(let j=i+1;j<=Math.min(i+max,lines.length-1);j++){const t=lines[j].text.trim();if(!t||pidRe.test(t)||sectRe.test(t)||curRe.test(t))break;s+=(s?' ':'')+t;}return s;}
  for(let i=0;i<lines.length;i++){
    const{text:ln,page}=lines[i];
    const im=ln.match(/Invoice\s*Number[:\s]*([\d]+)/i)||ln.match(/請求書番号\s*([\d]{7,12})/);
    if(im){curInv=im[1];continue}
    const tm=ln.match(/Tranche\s*ID\s+(\S+)/i);if(tm){curTr=tm[1];continue}
    if(/sub[\s-]*total|grand[\s-]*total/i.test(ln))continue;
    const wm=ln.match(pidRe);if(!wm||!curRe.test(ln))continue;
    const pid=wm[1],after=ln.substring(ln.indexOf(pid)+pid.length);
    let m=reFull.exec(after);
    if(m){
      const qty=pN(m[2]),up=pN(m[3]),ch=pN(m[4]),rate=pN(m[5]),tax=pN(m[6]),tot=pN(m[7]);
      if(tot>0){
        let prefix='';
        if(i>0){const prev=lines[i-1].text.trim();if(prev&&!pidRe.test(prev)&&!sectRe.test(prev)&&!curRe.test(prev))prefix=prev;}
        const suffix=jpFwd(i,1);
        const pname=[prefix,m[1].trim(),suffix].filter(Boolean).join(' ');
        items.push({inv:curInv,tranche:curTr,pid,pname,qty,up,charges:ch,tax,total:tot,taxRate:rate,crfRdf:0,srcFile:fileName,srcPage:page});
        continue;
      }
    }
    m=reNums.exec(after);
    if(m){
      let pname='';
      for(let j=i-1;j>=Math.max(0,i-2);j--){
        const prev=lines[j].text.trim();
        if(!prev)continue;
        if(sectRe.test(prev)||pidRe.test(prev)||curRe.test(prev))break;
        if(!/^\s*[\d,\s]+$/.test(prev))pname=prev+(pname?' '+pname:'');
      }
      const suffix=jpFwd(i,2);
      if(suffix)pname=(pname?pname+' ':'')+suffix;
      const qty=pN(m[1]),up=pN(m[2]),ch=pN(m[3]),rate=pN(m[4]),tax=pN(m[5]),tot=pN(m[6]);
      if(tot>0)items.push({inv:curInv,tranche:curTr,pid,pname:pname||pid,qty,up,charges:ch,tax,total:tot,taxRate:rate,crfRdf:0,srcFile:fileName,srcPage:page});
    }
  }
  return items;
}

function parseItemsUS(lines,fileName){

  const pidRe=/^([A-Za-z0-9][A-Za-z0-9_]{4,})\b/;
  const sectRe=/Tranche\s*ID|Invoice\s*Number|Sub[\s-]*Total|Grand[\s-]*Total|Product\s*ID/i;
  // Full pattern: product name (must start with letter) + qty + $up + $ch + $tax + $crf + $tot
  const reFull=/([A-Za-z].+?)\s+([\d,]+\.?\d*)\s+\$\s*([\d,]+\.?\d*)\s+\$\s*([\d,]+\.?\d*)\s+\$\s*([\d,]+\.?\d*)\s+\$\s*([\d,]+\.?\d*)\s+\$\s*([\d,]+\.?\d*)/;

  for(let i=0;i<lines.length;i++){

    if(/sub[\s-]*total|grand[\s-]*total/i.test(ln))continue;
    // Match product ID (WBD or general alphanumeric) + must have $ amounts
    const wm=ln.match(pidRe);if(!wm||!/\$\s*[\d,]/.test(ln))continue;
    const pid=wm[1],after=ln.substring(ln.indexOf(pid)+pid.length);

    }
    // Fallback: numbers-only 鈫?look back up to 3 lines + look-forward 1 line for suffix
    m=reNums.exec(after);
    if(m){
      let pname='';
      for(let j=i-1;j>=Math.max(0,i-3);j--){
        const prev=lines[j].text.trim();
        if(!prev)continue;
        if(sectRe.test(prev)||pidRe.test(prev))break;
        if(!/^\s*[\d,.$%\s]+$/.test(prev))pname=prev+(pname?' '+pname:'');
      }
      if(i+1<lines.length){const nxt=lines[i+1].text.trim();if(nxt&&!pidRe.test(nxt)&&!sectRe.test(nxt)&&!/\$\s*[\d,]/.test(nxt))pname=(pname?pname+' ':'')+nxt;}
      const qty=pN(m[1]),up=pN(m[2]),ch=pN(m[3]),tax=pN(m[4]),crf=pN(m[5]),tot=pN(m[6]);
      if(tot>0)items.push({inv:curInv,tranche:curTr,pid,pname:pname||pid,qty,up,charges:ch,tax,total:tot,crfRdf:crf,srcFile:fileName,srcPage:page});
    }

}

// 鈹€鈹€ CH Parser (Switzerland 鈥?CHF, decimal qty, 8.10% VAT) 鈹€鈹€
function parseItemsCH(lines,fileName){
  const items=[];let curInv='',curTr='';
  // Full pattern: product name + qty + CHF up + CHF charges + rate% + CHF tax + CHF total
  const reFull=/(.+?)\s+([\d,]+\.?\d*)\s+CHF\s*([\d,]+\.?\d*)\s+CHF\s*([\d,]+\.?\d*)\s+([\d.]+)\s*%\s+CHF\s*([\d,]+\.?\d*)\s+CHF\s*([\d,]+\.?\d*)/;

  const reNums=/^\s*([\d,]+\.?\d*)\s+CHF\s*([\d,]+\.?\d*)\s+CHF\s*([\d,]+\.?\d*)\s+([\d.]+)\s*%\s+CHF\s*([\d,]+\.?\d*)\s+CHF\s*([\d,]+\.?\d*)/;
  for(let i=0;i<lines.length;i++){
    const{text:ln,page}=lines[i];
    // Invoice Number: same line ("Invoice Number: 100426279") or next line (CH PDF style)
    const im=ln.match(/Invoice\s*Number[:\s]*(\d{7,12})/i);
    if(im){curInv=im[1];continue}
    if(/Invoice\s*Number/i.test(ln)&&!/\d{7,12}/.test(ln)){
      // CH: "Invoice Number  Invoice Date  Customer Number" 鈫?number on next line
      if(i+1<lines.length){const pk=lines[i+1].text.trim();const pm=pk.match(/^([A-Z]{2,}\d{6,}|\d{7,12})/);if(pm)curInv=pm[1];}
      continue;
    }
    const tm=ln.match(/Tranche\s*ID\s+(\S+)/i);if(tm){curTr=tm[1];continue}
    if(!/WBD[A-Z0-9]/i.test(ln)||/sub[\s-]*total|grand[\s-]*total/i.test(ln))continue;
    const wm=ln.match(/(WBD[A-Z0-9]+)/i);if(!wm)continue;
    const pid=wm[1],after=ln.substring(ln.indexOf(pid)+pid.length);
    let m=reFull.exec(after);
    if(m){
      const pname=m[1].trim()||inferPname(i)||pid;
      const qty=pN(m[2]),up=pN(m[3]),ch=pN(m[4]),rate=pN(m[5]),tax=pN(m[6]),tot=pN(m[7]);
      if(tot>0){items.push({inv:curInv,tranche:curTr,pid,pname,qty,up,charges:ch,tax,total:tot,taxRate:rate,crfRdf:0,srcFile:fileName,srcPage:page});continue;}
    }
    m=reNums.exec(after);
    if(m){
      let pname='';
      for(let j=i-1;j>=Math.max(0,i-3);j--){
        const prev=lines[j].text.trim();
        if(!prev)continue;
        if(/Tranche\s*ID|Invoice\s*Number|Sub-Total|Grand[\s-]*Total|Product\s*ID/i.test(prev))break;
        if(/WBD[A-Z0-9]/i.test(prev))break;
        if(!/^\s*[\d,.CHF%\s]+$/.test(prev))pname=prev+(pname?' '+pname:'');
      }
      // look-forward 1 line for suffix (e.g. "1151/Swiss")
      if(i+1<lines.length){const nxt=lines[i+1].text.trim();if(nxt&&!/WBD[A-Z0-9]/i.test(nxt)&&!/Tranche\s*ID|Invoice\s*Number|Sub[\s-]*Total|Grand[\s-]*Total|Product\s*ID/i.test(nxt)&&!/CHF\s*[\d,]/.test(nxt))pname=(pname?pname+' ':'')+nxt;}
      const qty=pN(m[1]),up=pN(m[2]),ch=pN(m[3]),rate=pN(m[4]),tax=pN(m[5]),tot=pN(m[6]);
      if(tot>0)items.push({inv:curInv,tranche:curTr,pid,pname:pname||pid,qty,up,charges:ch,tax,total:tot,taxRate:rate,crfRdf:0,srcFile:fileName,srcPage:page});
    }
  }
  return items;
}

// 鈹€鈹€ EMEA Parser (AT/BE/DE/ES/FR/GB/GR/IE/IT/NL/PT/SE 鈥?EUR/GBP/SEK with non-WBD support) 鈹€鈹€
function parseItemsEMEA(lines,fileName){
  const items=[];let curInv='',curTr='';
  // General product ID: WBD... or alphanumeric+underscore (e.g. 21FBSDGX0L_AAS, 78722528_AAS)
  const pidRe=/^([A-Za-z0-9][A-Za-z0-9_]{4,})\b/;
  const strictPidRe=/^(?:WBD[A-Z0-9]+|[A-Z0-9]{5,}_[A-Z0-9_]+)$/i;
  const sectRe=/Tranche\s*ID|Invoice\s*Number|Sub[\s-]*Total|Grand[\s-]*Total|Product\s*ID/i;
  // Currency: EUR/GBP/SEK (prefix/suffix, handle mojibake euro)
  const curSymS='(?:\\u20ac|\\u00a3|\\u00e2\\u201a\\u00ac|\\u0432\\u201a\\u00ac|SEK|GBP|EUR|CHF)';
  const curRe=new RegExp('(?:'+curSymS+')\\s*[\\d,]+');
  // Full: pname qty CUR up CUR charges rate% CUR tax CUR total
  const reFull=new RegExp('(.+?)\\s+([\\d,]+\\.?\\d*)\\s+'+curSymS+'\\s*([\\d,]+\\.?\\d*)\\s+'+curSymS+'\\s*([\\d,]+\\.?\\d*)\\s+([\\d.]+)\\s*%\\s+'+curSymS+'\\s*([\\d,]+\\.?\\d*)\\s+'+curSymS+'\\s*([\\d,]+\\.?\\d*)');
  // Numbers-only: qty CUR up CUR charges rate% CUR tax CUR total
  const curReS=new RegExp('[\\d,]+\\.?\\d*\\s*'+curSymS);
  const amtS='(?:'+curSymS+'\\s*)?([\\d,]+\\.?\\d*)\\s*(?:'+curSymS+')?';
  const reFullS=new RegExp('(.+?)\\s+([\\d,]+\\.?\\d*)\\s+'+amtS+'\\s+'+amtS+'\\s+([\\d.]+)\\s*%\\s+'+amtS+'\\s+'+amtS);
  const reNumsS=new RegExp('^\\s*([\\d,]+\\.?\\d*)\\s+'+amtS+'\\s+'+amtS+'\\s+([\\d.]+)\\s*%\\s+'+amtS+'\\s+'+amtS);
  const reNums=new RegExp('^\\s*([\\d,]+\\.?\\d*)\\s+'+curSymS+'\\s*([\\d,]+\\.?\\d*)\\s+'+curSymS+'\\s*([\\d,]+\\.?\\d*)\\s+([\\d.]+)\\s*%\\s+'+curSymS+'\\s*([\\d,]+\\.?\\d*)\\s+'+curSymS+'\\s*([\\d,]+\\.?\\d*)');
  function shouldAppendContinuation(base,next){
    if(!next)return false;
    if(sectRe.test(next)||strictPidRe.test(next)||curRe.test(next)||curReS.test(next))return false;
    if(/^sub[\s-]*total|grand[\s-]*total|page \d+ of \d+/i.test(next))return false;
    if(/^(Lenovo|This is a computer generated|Payable on:|Please raise your claims|Transactions relating|Place of performance|Payment Terms:|A late payment charge|Payment by Bank Transfer:|Please ask your bank|Citibank|SWIFT code:)/i.test(next))return false;
    if(/^[A-Za-z]+$/.test(next)){
      return /[-/(]$/.test(base)||/\b(English|German|French|Spanish|Italian|Japanese|USEnglish|US English|Monthly)$/i.test(base);
    }
    return true;
  }
  function mergePnameParts(lead,tail){
    const a=(lead||'').trim();
    const b=(tail||'').trim();
    if(!a)return b;
    if(!b)return a;
    if(a===b)return a;
    if(a.includes(b))return a;
    if(b.includes(a))return b;
    return `${a} ${b}`.trim();
  }
  function appendContinuation(base,idx){
    let pname=base||'';
    for(let j=idx+1;j<Math.min(idx+4,lines.length);j++){
      const nxt=lines[j].text.trim();
      if(!shouldAppendContinuation(pname,nxt))break;
      pname+=(pname?' ':'')+nxt;
    }
    return pname.trim();
  }
  function inferPname(idx){

  function cleanPart(s){return String(s||'').replace(/\s+/g,' ').trim()}
  function mergeParts(parts){
    const out=[];
    for(const raw of parts){
      const part=cleanPart(raw);
      if(!part)continue;
      if(out.length&&out[out.length-1]===part)continue;
      out.push(part);
    }
    return out.join(' ').trim();
  }
  function isTextOnly(line){
    return line&&!stopTextRe.test(line)&&!fullRe.test(line)&&!numsRe.test(line)&&!/\d+\s+(?:EUR|CHF|GBP|SEK)\s*[\d,]/.test(line);

      if(/^[A-Z0-9]{5,}_[A-Z0-9_]+$/i.test(nxt)||languageOnlyRe.test(nxt)||/^\//.test(nxt)||/(Win11|SSD|English|German|Monthly|EMMITSBURG)/i.test(nxt)){

    if(/^Tranche\s*ID$/i.test(ln)){
      curTr='';pending=[];
      for(let j=i-1;j>=Math.max(0,i-2);j--){
        const prev=cleanPart(lines[j].text);
        if(trancheValueRe.test(prev)){curTr=prev;break}
      }
      continue;
    }
    if(stopTextRe.test(ln)){pending=[];continue}
    let m=ln.match(fullRe);
    if(m){
      const suffixInfo=collectSuffix(i);
      const pname=mergeParts([pending.join(' '),m[2],suffixInfo.suffix])||m[1];
      const qty=pN(m[3]),up=pN(m[4]),ch=pN(m[5]),rate=pN(m[6]),tax=pN(m[7]),tot=pN(m[8]);
      if(tot>0)items.push({inv:curInv,tranche:curTr,pid:m[1],pname,qty,up,charges:ch,tax,total:tot,taxRate:rate,crfRdf:0,srcFile:fileName,srcPage:page});
      pending=[];i=suffixInfo.endIdx;continue;
    }
    m=ln.match(numsRe);
    if(m){
      const suffixInfo=collectSuffix(i);
      const pname=mergeParts([pending.join(' '),suffixInfo.suffix])||m[1];
      const qty=pN(m[2]),up=pN(m[3]),ch=pN(m[4]),rate=pN(m[5]),tax=pN(m[6]),tot=pN(m[7]);
      if(tot>0)items.push({inv:curInv,tranche:curTr,pid:m[1],pname,qty,up,charges:ch,tax,total:tot,taxRate:rate,crfRdf:0,srcFile:fileName,srcPage:page});
      pending=[];i=suffixInfo.endIdx;continue;
    }
    if(isTextOnly(ln)){
      pending.push(ln);
      if(pending.length>1)pending=pending.slice(-1);
    }
  }
  return items;
}

function parseItemsGen(lines,fileName,knownInvs,country){
  const items=[];let curInv='',curTr='';
  // TH PDFs contain 3 identical copies (ORIGINAL/CUSTOMER/BILLING COPY) 鈥?only parse ORIGINAL COPY pages
  const skipPages=new Set();
  if(country==='TH')for(const{text:ln,page}of lines){if(/CUSTOMER\s+COPY|BILLING\s+COPY/i.test(ln))skipPages.add(page);}
  // General product ID: WBD... or alphanumeric+underscore
  const pidRe=/^([A-Za-z0-9][A-Za-z0-9_]{4,})\b/;
  const sectRe=/Tranche\s*ID|Invoice\s*Number|Sub[\s-]*Total|Grand[\s-]*Total|Product\s*ID/i;
  // Currency patterns 鈥?support $, RM, or no symbol
  const curSym='(?:\\$|RM)';
  // With $ or RM: pname qty CUR up CUR charges rate% CUR tax CUR total
  const reA=new RegExp('(.+?)\\s+([\\d,]+\\.?\\d*)\\s+'+curSym+'\\s*([\\d,]+\\.?\\d*)\\s+'+curSym+'\\s*([\\d,]+\\.?\\d*)\\s+([\\d.]+)\\s*%\\s+'+curSym+'\\s*([\\d,]+\\.?\\d*)\\s+'+curSym+'\\s*([\\d,]+\\.?\\d*)');
  // No-name with $: qty $up $charges rate% $tax $total
  const reNN=new RegExp('^\\s*([\\d,]+\\.\\d{2})\\s*'+curSym+'\\s*([\\d,]+\\.\\d{2})\\s*'+curSym+'\\s*([\\d,]+\\.\\d{2})\\s*([\\d.]+)\\s*%\\s*'+curSym+'\\s*([\\d,]+\\.\\d{2})\\s*'+curSym+'\\s*([\\d,]+\\.\\d{2})');
  // No currency symbol (PH/TH): pname qty up charges rate% tax total OR pname qty up charges total (no tax)
  const reNoSym=/(.+?)\s+([\d,]+\.?\d*)\s+([\d,]+\.?\d*)\s+([\d,]+\.?\d*)\s+([\d.]+)\s*%\s+([\d,]+\.?\d*)\s+([\d,]+\.?\d*)/;
  // MY/PH no-tax: pname qty RM up RM charges RM total (3 amounts no tax)
  const reNoTax=new RegExp('(.+?)\\s+([\\d,]+\\.?\\d*)\\s+'+curSym+'\\s*([\\d,]+\\.?\\d*)\\s+'+curSym+'\\s*([\\d,]+\\.?\\d*)\\s+'+curSym+'\\s*([\\d,]+\\.?\\d*)');
  // PH plain no-tax: pname qty up charges total (4 numbers, no symbol, no tax column)
  const rePhNoTax=/(.+?)\s+([\d,]+\.?\d*)\s+([\d,]+\.?\d*)\s+([\d,]+\.?\d*)\s+([\d,]+\.?\d*)\s*$/;
  for(let i=0;i<lines.length;i++){
    const{text:ln,page}=lines[i];
    if(skipPages.has(page))continue;
    // Invoice number detection
    const im=ln.match(/(?:Tax\s+)?Invoice\s*(?:Number|No\.?|鐣彿)\s*:?\s*([\d]{7,12})\b/i);
    if(im){curInv=im[1];continue}
    if(/Invoice\s*(?:Number|No\.?)/i.test(ln)&&!/[\d]{7,12}/.test(ln)){
      if(i+1<lines.length){const pk=lines[i+1].text.trim();const pm=pk.match(/^([\d]{7,12})\b/);if(pm)curInv=pm[1];}
      continue;
    }
    // Fallback for CID fonts
    if(knownInvs&&knownInvs.size){
      const collapsed=ln.replace(/\s/g,'');
      for(const[,run]of collapsed.matchAll(/(\d{7,12})/g)){
        if(knownInvs.has(run)){curInv=run;break;}
      }
    }
    const tm=ln.match(/Tranche\s*ID\s+(\S+)/i);if(tm){curTr=tm[1];continue}
    if(/sub[\s-]*total|grand[\s-]*total/i.test(ln))continue;
    // Match product ID (WBD or general alphanumeric)
    const wm=ln.match(pidRe);if(!wm)continue;
    const pid=wm[1],after=ln.substring(ln.indexOf(pid)+pid.length);
    // Need at least some digits after PID
    if(!/\d/.test(after))continue;
    // Try $ / RM currency pattern
    let m=reA.exec(after);
    if(m&&pN(m[7])>0){items.push({inv:curInv,tranche:curTr,pid,pname:m[1].trim(),qty:pN(m[2]),up:pN(m[3]),charges:pN(m[4]),tax:pN(m[6]),total:pN(m[7]),taxRate:pN(m[5]),crfRdf:0,srcFile:fileName,srcPage:page});continue;}
    // No-name with $ (AU/HK pattern)
    m=reNN.exec(after);
    if(m&&pN(m[6])>0){items.push({inv:curInv,tranche:curTr,pid,pname:'',qty:pN(m[1]),up:pN(m[2]),charges:pN(m[3]),tax:pN(m[5]),total:pN(m[6]),taxRate:pN(m[4]),crfRdf:0,srcFile:fileName,srcPage:page});continue;}
    // No-tax with RM/$ (MY pattern): qty CUR up CUR charges CUR total
    m=reNoTax.exec(after);
    if(m&&pN(m[5])>0&&!/%/.test(after)){items.push({inv:curInv,tranche:curTr,pid,pname:m[1].trim(),qty:pN(m[2]),up:pN(m[3]),charges:pN(m[4]),tax:0,total:pN(m[5]),taxRate:0,crfRdf:0,srcFile:fileName,srcPage:page});continue;}
    // No-symbol with rate% (TH pattern)
    m=reNoSym.exec(after);
    if(m&&pN(m[7])>0){items.push({inv:curInv,tranche:curTr,pid,pname:m[1].trim(),qty:pN(m[2]),up:pN(m[3]),charges:pN(m[4]),tax:pN(m[6]),total:pN(m[7]),taxRate:pN(m[5]),crfRdf:0,srcFile:fileName,srcPage:page});continue;}
    // PH plain no-tax (4 numbers only): qty up charges total
    m=rePhNoTax.exec(after);
    if(m&&pN(m[5])>0&&Math.abs(pN(m[4])-pN(m[5]))<1){items.push({inv:curInv,tranche:curTr,pid,pname:m[1].trim(),qty:pN(m[2]),up:pN(m[3]),charges:pN(m[4]),tax:0,total:pN(m[5]),taxRate:0,crfRdf:0,srcFile:fileName,srcPage:page});continue;}
  }
  return items;
}

// 鈹€鈹€ Router 鈹€鈹€
function parseItems(country,lines,fileName,knownInvs){
  if(/^AT01_STMT_BRIM_STATEMENT_/i.test(fileName))return parseItemsAT01(lines,fileName);
  if(/^GB11_STMT_BRIM_STATEMENT_/i.test(fileName))return parseItemsGB11(lines,fileName);
  if(/^NL01_STMT_BRIM_STATEMENT_/i.test(fileName))return parseItemsNL01(lines,fileName);
  if(/^NL11_STMT_BRIM_STATEMENT_/i.test(fileName))return parseItemsNL11(lines,fileName);
  if(country==='TH')return parseItemsTH(lines,fileName);
  if(country==='MY')return parseItemsMY(lines,fileName);
  if(country==='JP')return parseItemsJP(lines,fileName);
  if(country==='US')return parseItemsUS(lines,fileName);
  if(country==='CA')return parseItemsUS(lines,fileName); // CA uses same 5-col $ format as US
  if(country==='CH')return parseItemsCH(lines,fileName);
  if(country==='KR')return parseItemsKR(lines,fileName);
  if(country==='IN')return parseItemsIN(lines,fileName);
  // EMEA: EUR/GBP/SEK countries
  const emeaCC=new Set(['AT','BE','DE','ES','FR','GB','GR','IE','IT','NL','PT','SE']);
  if(emeaCC.has(country))return parseItemsEMEA(lines,fileName);
  return parseItemsGen(lines,fileName,knownInvs,country);
}

// 鈹€鈹€ Full statement parse 鈹€鈹€
function parseStatement(lines,fileName){
  const fullText=lines.map(l=>l.text).join('\n');
  const country=detectCountry(fullText,fileName);
  const cur=(CM[country]||CM.OTHER).cur;

  let bsDerived=false;

  const li=parseItems(country,lines,fileName,knownInvs);  // Detail totals per invoice
  const dt={};
  for(const r of li){const k=r.inv||'?';if(!dt[k])dt[k]={charges:0,tax:0,total:0,crfRdf:0,count:0,nonWbd:0};dt[k].charges+=r.charges;dt[k].tax+=r.tax;dt[k].total+=r.total;dt[k].crfRdf+=(r.crfRdf||0);dt[k].count++;if(!/^WBD/i.test(r.pid))dt[k].nonWbd++}
    // If billing summary missing, derive from detail totals
  if(!bs.length&&Object.keys(dt).length){
    bsDerived=true;
    bs=Object.entries(dt).map(([inv,v])=>({inv,charges:v.charges,tax:v.tax,total:v.total,crf:0,rdf:0}));
  }
  const dGT={charges:Object.values(dt).reduce((s,v)=>s+v.charges,0),tax:Object.values(dt).reduce((s,v)=>s+v.tax,0),total:Object.values(dt).reduce((s,v)=>s+v.total,0),crfRdf:Object.values(dt).reduce((s,v)=>s+(v.crfRdf||0),0)};
  const sT=bs.reduce((a,r)=>{a.charges+=r.charges||0;a.tax+=r.tax||0;a.total+=r.total||0;a.crfRdf+=(r.crf||0)+(r.rdf||0);return a;},{charges:0,tax:0,total:0,crfRdf:0});
  // Comparison + unmapped
  const comp=[],unmS=[],unmD=[];
  const sSet=new Set(bs.map(r=>r.inv)),dSet=new Set(Object.keys(dt));
  for(const sr of bs){
    const d=dt[sr.inv];
    if(d){const cd=Math.abs(sr.charges-d.charges),txd=Math.abs(sr.tax-d.tax);
      // SUM reference total = billing summary charges+tax + CRF/RDF from DET items
      // (billing summary Total column may exclude CRF/RDF that appears on individual invoice pages)
      const srTotAdj=sr.charges+sr.tax+(d.crfRdf||0);
      const td=Math.abs(srTotAdj-d.total);
      comp.push({inv:sr.inv,sC:sr.charges,sT:sr.tax,sTot:srTotAdj,dC:d.charges,dT:d.tax,dTot:d.total,dC_:cd,dT_:txd,dTot_:td,mC:cd<1,mT:txd<1,mTot:td<1,m:cd<1&&txd<1&&td<1,n:d.count,nw:d.nonWbd||0,st:'matched'});
    }else{unmS.push(sr.inv);comp.push({inv:sr.inv,sC:sr.charges,sT:sr.tax,sTot:sr.total,dC:0,dT:0,dTot:0,dC_:sr.charges,dT_:sr.tax,dTot_:sr.total,mC:false,mT:false,mTot:false,m:false,n:0,nw:0,st:'summary_only'})}
  }
  for(const inv of dSet){if(!sSet.has(inv)){const d=dt[inv];unmD.push(inv);comp.push({inv,sC:0,sT:0,sTot:0,dC:d.charges,dT:d.tax,dTot:d.total,dC_:d.charges,dT_:d.tax,dTot_:d.total,mC:false,mT:false,mTot:false,m:false,n:d.count,nw:d.nonWbd||0,st:'detail_only'})}}
  // Validation
  const vr=[];const noD=li.length===0;
  if(bsDerived){
    const invs=Object.keys(dt);
    vr.push({nm:`Billing Summary missing (${invs.length} invoice${invs.length>1?'s':''})`,p:false,sv:'f',dt:invs.join(', ')});
  }
  const cd=Math.abs(sT.charges-dGT.charges),txd=Math.abs(sT.tax-dGT.tax);
  // Grand Total reference = sum of (charges+tax) from billing summary + all CRF/RDF from DET items
  const sTotAdj=sT.charges+sT.tax+dGT.crfRdf;
  const td=Math.abs(sTotAdj-dGT.total);
  vr.push({nm:'Grand Total - Charges',p:cd<1,sv:cd<1?'p':(noD?'w':'f'),dt:`Sum: ${fc(sT.charges,cur)} | Det: ${fc(dGT.charges,cur)} | Diff: ${fc(cd,cur)}`});
  vr.push({nm:'Grand Total - Tax',p:txd<1,sv:txd<1?'p':(noD?'w':'f'),dt:`Sum: ${fc(sT.tax,cur)} | Det: ${fc(dGT.tax,cur)} | Diff: ${fc(txd,cur)}`});
  vr.push({nm:'Grand Total - Total',p:td<1,sv:td<1?'p':(noD?'w':'f'),dt:`Sum: ${fc(sTotAdj,cur)} | Det: ${fc(dGT.total,cur)} | Diff: ${fc(td,cur)}`});
  if(unmS.length)vr.push({nm:`Detail pages missing (${unmS.length} invoice${unmS.length>1?'s':''})`,p:false,sv:'f',dt:unmS.join(', ')});
  if(unmD.length)vr.push({nm:`${unmD.length} inv in Detail only`,p:false,sv:'f',dt:unmD.join(', ')});
  for(const r of bs){const c=r.charges+r.tax+(r.crf||0)+(r.rdf||0),d=Math.abs(c-r.total);
    vr.push({nm:`Inv ${r.inv}: arithmetic`,p:d<1,sv:d<1?'p':'f',dt:`${fc(r.charges,cur)} + ${fc(r.tax,cur)} = ${fc(c,cur)} vs ${fc(r.total,cur)} | Diff: ${fc(d,cur)}`})}
  for(const c of comp.filter(x=>x.st==='matched'&&!x.m))
    vr.push({nm:`Inv ${c.inv}: mismatch`,p:false,sv:'f',dt:`Diff charges=${fc(c.dC_,cur)} | tax=${fc(c.dT_,cur)} | total=${fc(c.dTot_,cur)}`});
  vr.push({nm:'Line Items',p:li.length>0,sv:li.length>0?'p':'w',dt:li.length?`${li.length} WBD, ${new Set(li.map(l=>l.tranche)).size} tranches`:t('no_items')});
  const nwAll=li.filter(l=>!/^WBD/i.test(l.pid));
  if(nwAll.length){const byInv={};for(const l of nwAll){if(!byInv[l.inv])byInv[l.inv]=[];byInv[l.inv].push(l.pid)}
    const det=Object.entries(byInv).map(([inv,pids])=>`${inv}: ${pids.join(', ')}`).join(' | ');
    vr.push({nm:`${nwAll.length} non-WBD product(s)`,p:false,sv:'w',dt:det})}

  return{fileName,country,cur,hd,bs,li,sT,dt,dGT,comp,unmS,unmD,vr};
}

const dzEl = document.getElementById('dz');
const fInEl = document.getElementById('fIn');
const fileListEl = document.getElementById('fList');
const actionBarEl = document.getElementById('aBar');
const runBtnEl = document.getElementById('runBtn');
const exportBtnEl = document.getElementById('exBtn');
const progressWrapEl = document.getElementById('pw');
const progressBarEl = document.getElementById('pbar');
const progressLabelEl = document.getElementById('plab');
const summaryWrapEl = document.getElementById('gSum');
const cardsEl = document.getElementById('gCards');
const resultsEl = document.getElementById('results');

dzEl.addEventListener('click', () => fInEl.click());
dzEl.addEventListener('dragover', e => {
  e.preventDefault();
  dzEl.classList.add('dg');
});
dzEl.addEventListener('dragleave', () => dzEl.classList.remove('dg'));
dzEl.addEventListener('drop', e => {
  e.preventDefault();
  dzEl.classList.remove('dg');
  addFiles(e.dataTransfer.files);
});
fInEl.addEventListener('change', e => {
  addFiles(e.target.files);
  e.target.value = '';
});

function setProg(percent, label) {
  progressWrapEl.style.display = 'block';
  progressBarEl.style.width = `${percent}%`;
  progressLabelEl.textContent = label;
}

async function addFiles(fileList) {
  for (const file of fileList) {
    if (!file.name.toLowerCase().endsWith('.pdf')) continue;
    const id = ++eid;
    const entry = {
      id,
      file,
      name: file.name,
      size: file.size,
      country: null,
      status: 'detecting',
      lines: null,
      error: '',
    };
    fileEntries.push(entry);
    renderFileList();
    try {
      const lines = await pdfToLines(file);
      entry.lines = lines;
      entry.country = detectCountry(
        lines.slice(0, 40).map(line => line.text).join('\n'),
        file.name
      );
      entry.name = inferDisplayName(file.name, entry.country, lines);
      entry.status = 'ready';
    } catch (err) {
      entry.status = 'error';
      entry.error = err && err.message ? err.message : String(err);
      console.error(file.name, err);
    }
    renderFileList();
    updateRunButton();
  }
}

function removeFile(id) {
  fileEntries = fileEntries.filter(entry => entry.id !== id);
  renderFileList();
  updateRunButton();
}

function clearAll() {
  fileEntries = [];
  analysisResults = null;
  fileListEl.innerHTML = '';
  resultsEl.innerHTML = '';
  cardsEl.innerHTML = '';
  summaryWrapEl.style.display = 'none';
  actionBarEl.style.display = 'none';
  exportBtnEl.style.display = 'none';
  updateRunButton();
}

function renderFileList() {
  fileListEl.innerHTML = fileEntries.map(entry => {
    const meta = entry.country ? (CM[entry.country] || CM.OTHER) : null;
    const badge = entry.status === 'detecting'
      ? `<span class="lb det">${t('detecting')}</span>`
      : entry.status === 'error'
        ? `<span class="lb err">${t('error')}</span>`
        : `<span class="lb ok">${esc(meta.flag)} ${esc(entry.country)}</span>`;
    return `
      <div class="fi">
        <span class="fi-type">PDF</span>
        <span class="fn" title="${esc(entry.name)}">${esc(entry.name)}</span>
        <span class="fs">${fmtSz(entry.size)}</span>
        ${badge}
        <button class="rb" onclick="removeFile(${entry.id})" title="Remove">x</button>
      </div>
    `;
  }).join('');
  actionBarEl.style.display = fileEntries.length ? 'flex' : 'none';
}

function updateRunButton() {
  const readyCount = fileEntries.filter(entry => entry.status === 'ready').length;
  runBtnEl.disabled = readyCount === 0;
  runBtnEl.textContent = readyCount
    ? `${t('run_btn')} (${readyCount})`
    : t('run_btn');
}

async function runAll() {
  const ready = fileEntries.filter(entry => entry.status === 'ready');
  if (!ready.length) return;

  runBtnEl.disabled = true;
  exportBtnEl.style.display = 'none';
  resultsEl.innerHTML = '';
  cardsEl.innerHTML = '';
  summaryWrapEl.style.display = 'none';
  analysisResults = {};

  setProg(2, t('starting'));

  for (let index = 0; index < ready.length; index++) {
    const entry = ready[index];
    setProg(
      Math.round((index / ready.length) * 80) + 10,
      `${t('parsing')} ${entry.name}`
    );
    try {
      const lines = entry.lines || await pdfToLines(entry.file);
      const statement = parseStatement(lines, entry.name);
      const key = statement.country;
      if (!analysisResults[key]) {
        analysisResults[key] = {
          country: key,
          meta: CM[key] || CM.OTHER,
          stmts: [],
        };
      }
      analysisResults[key].stmts.push(statement);
    } catch (err) {
      console.error(entry.name, err);
    }
  }

  setProg(94, t('rendering'));
  renderResults();
  setProg(100, t('done'));
  runBtnEl.disabled = false;
  exportBtnEl.style.display = 'inline-flex';
  setTimeout(() => {
    progressWrapEl.style.display = 'none';
  }, 1200);
}

function renderResults() {
  if (!analysisResults) return;
  const countries = Object.keys(analysisResults).sort();
  if (!countries.length) {
    resultsEl.innerHTML = '<div class="ib w">No parsed statements.</div>';
    return;
  }

  cardsEl.innerHTML = countries.map((code, index) => {
    const group = analysisResults[code];
    const invCount = group.stmts.reduce((sum, stmt) => sum + stmt.bs.length, 0);
    const itemCount = group.stmts.reduce((sum, stmt) => sum + stmt.li.length, 0);
    const issueCount = group.stmts.reduce(
      (sum, stmt) => sum + stmt.vr.filter(check => check.sv === 'f').length,
      0
    );
    const unmappedCount = group.stmts.reduce(
      (sum, stmt) => sum + stmt.unmS.length + stmt.unmD.length,
      0
    );
    return `
      <div class="gc ${index === 0 ? 'a' : ''}" id="gc-${esc(code)}" onclick="swC('${esc(code)}')">
        <div class="gc-f">${esc(group.meta.flag)}</div>
        <div class="gc-n">${esc(group.meta.label)} (${esc(code)})</div>
        <div class="gc-r"><span>${t('stmts')}</span><span class="gc-v">${group.stmts.length}</span></div>
        <div class="gc-r"><span>${t('invoices')}</span><span class="gc-v">${invCount}</span></div>
        <div class="gc-r"><span>${t('items')}</span><span class="gc-v">${itemCount}</span></div>
        <div class="gc-r"><span>${t('unmapped')}</span><span class="gc-v ${unmappedCount ? 'er' : 'ok'}">${unmappedCount}</span></div>
        <div class="gc-r"><span>${t('issues')}</span><span class="gc-v ${issueCount ? 'er' : 'ok'}">${issueCount}</span></div>
      </div>
    `;
  }).join('');

  summaryWrapEl.style.display = 'block';
  let html = `<div class="tabs"><button class="tab a" id="tab-hier" onclick="swTab('hier')">${t('hierarchy')}</button>`;
  for (const code of countries) {
    html += `<button class="tab" id="tab-${esc(code)}" onclick="swTab('${esc(code)}');swC('${esc(code)}')">${esc(analysisResults[code].meta.flag)} ${esc(code)}</button>`;
  }
  html += `</div>`;
  html += `<div class="tp a" id="tp-hier">${renderHierarchy()}</div>`;
  for (const code of countries) {
    html += `<div class="tp" id="tp-${esc(code)}">${renderCountrySection(code)}</div>`;
  }
  resultsEl.innerHTML = html;
}

function renderCountrySection(code) {
  const group = analysisResults[code];
  const byCustomer = {};
  for (const stmt of group.stmts) {
    const key = stmt.hd.custName || stmt.hd.custNum || 'Unknown';
    if (!byCustomer[key]) byCustomer[key] = [];
    byCustomer[key].push(stmt);
  }
  const customers = Object.keys(byCustomer);
  const subId = `sc-${code}`;
  return `
    <section class="country-section">
      <div class="tb">
        <div>
          <strong>${esc(group.meta.flag)} ${esc(group.meta.label)} (${esc(code)})</strong>
        </div>
        <div>${group.stmts.length} ${t('stmts')}</div>
      </div>
      <div class="stabs">
        ${customers.map((customer, index) => {
          const short = customer.length > 28 ? `${customer.slice(0, 26)}...` : customer;
          return `<button class="st ${index === 0 ? 'a' : ''}" id="${subId}-${index}" onclick="swSub('${esc(code)}',${index},${customers.length})" title="${esc(customer)}">${esc(short)} (${byCustomer[customer].length})</button>`;
        }).join('')}
      </div>
      ${customers.map((customer, index) => {
        return `<div class="sp ${index === 0 ? 'a' : ''}" id="${subId}-p-${index}">${byCustomer[customer].map(stmt => renderStatement(stmt)).join('')}</div>`;
      }).join('')}
    </section>
  `;
}

function renderStatement(stmt) {
  const issueCount = stmt.vr.filter(check => check.sv === 'f').length;
  const customer = stmt.hd.custName || stmt.hd.custNum || 'Unknown';
  const period = stmt.hd.period || 'Unknown';
  const unmappedCount = stmt.unmS.length + stmt.unmD.length;
  const safeId = (`d_${stmt.hd.stmtNum || stmt.fileName}`).replace(/\W/g, '');
  return `
    <article class="statement-card">
      <div class="tb">
        <div>
          <strong>${esc(stmt.hd.stmtNum || stmt.fileName)}</strong>
          <span class="tb-meta">${esc(customer)}</span>
          <span class="tb-meta">${esc(period)}</span>
          <span class="tb-meta">${esc(stmt.hd.date || '')}</span>
          <span class="tb-meta">${stmt.bs.length} ${t('invoices')}</span>
          <span class="tb-meta">${stmt.li.length} ${t('items')}</span>
        </div>
        <div class="${issueCount ? 'tre' : 'tg'}">${issueCount} ${t('issues')}</div>
      </div>
      ${unmappedCount ? `<div class="ib w" style="margin:10px 0">${unmappedCount} ${t('unmapped')}</div>` : ''}
      ${renderComparisonTable(stmt)}
      ${renderSummaryTable(stmt)}
      ${renderDetailTable(stmt, safeId)}
      ${renderValidationList(stmt)}
    </article>
  `;
}

function renderComparisonTable(stmt) {
  const rows = stmt.comp.map(row => `
    <tr class="${row.st !== 'matched' ? 'ro' : ''}">
      <td class="mono">${esc(row.inv)}</td>
      <td>${esc(row.st)}</td>
      <td class="tr mono">${row.sC ? fc(row.sC, stmt.cur) : ''}</td>
      <td class="tr mono">${row.dC ? fc(row.dC, stmt.cur) : ''}</td>
      <td class="tr mono">${fc(row.dC_ || 0, stmt.cur)}</td>
      <td class="tr mono">${row.sT ? fc(row.sT, stmt.cur) : ''}</td>
      <td class="tr mono">${row.dT ? fc(row.dT, stmt.cur) : ''}</td>
      <td class="tr mono">${fc(row.dT_ || 0, stmt.cur)}</td>
      <td class="tr mono">${row.sTot ? fc(row.sTot, stmt.cur) : ''}</td>
      <td class="tr mono">${row.dTot ? fc(row.dTot, stmt.cur) : ''}</td>
      <td class="tr mono">${fc(row.dTot_ || 0, stmt.cur)}</td>
      <td class="tr mono">${row.n || 0}</td>
      <td>${row.m ? 'OK' : 'Mismatch'}</td>
    </tr>
  `).join('');

  return `
    <div class="tw">
      <table>
        <thead>
          <tr>
            <th>${t('invoice')}</th>
            <th>${t('status')}</th>
            <th class="tr">Sum ${t('charges')}</th>
            <th class="tr">Det ${t('charges')}</th>
            <th class="tr">${t('diff')}</th>
            <th class="tr">Sum ${t('tax')}</th>
            <th class="tr">Det ${t('tax')}</th>
            <th class="tr">${t('diff')}</th>
            <th class="tr">Sum ${t('total')}</th>
            <th class="tr">Det ${t('total')}</th>
            <th class="tr">${t('diff')}</th>
            <th class="tr">#</th>
            <th>${t('match')}</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function renderSummaryTable(stmt) {
  const hasFee = stmt.bs.some(row => row.crf || row.rdf);
  const rows = stmt.bs.map(row => `
    <tr>
      <td class="mono">${esc(row.inv)}</td>
      <td class="tr mono">${fc(row.charges || 0, stmt.cur)}</td>
      <td class="tr mono">${fc(row.tax || 0, stmt.cur)}</td>
      ${hasFee ? `<td class="tr mono">${fc(row.crf || 0, stmt.cur)}</td><td class="tr mono">${fc(row.rdf || 0, stmt.cur)}</td>` : ''}
      <td class="tr mono">${fc(row.total || 0, stmt.cur)}</td>
    </tr>
  `).join('');

  return `
    <details>
      <summary>${t('billing_sum')} (${stmt.bs.length})</summary>
      <div class="tw">
        <table>
          <thead>
            <tr>
              <th>${t('invoice')}</th>
              <th class="tr">${t('charges')}</th>
              <th class="tr">${t('tax')}</th>
              ${hasFee ? '<th class="tr">CRF</th><th class="tr">RDF</th>' : ''}
              <th class="tr">${t('total')}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </details>
  `;
}

function renderDetailTable(stmt, safeId) {
  const invoices = [...new Set(stmt.li.map(item => item.inv))].sort();
  const hasCrf = stmt.li.some(item => item.crfRdf);
  const rows = stmt.li.map(item => `
    <tr data-inv="${esc(item.inv)}">
      <td class="mono">${esc(item.inv)}</td>
      <td class="mono">${esc(item.tranche || '')}</td>
      <td class="mono">${esc(item.pid || '')}</td>
      <td>${esc(item.pname || '')}</td>
      <td class="tr mono">${item.qty ?? ''}</td>
      <td class="tr mono">${fc(item.up || 0, stmt.cur)}</td>
      <td class="tr mono">${fc(item.charges || 0, stmt.cur)}</td>
      <td class="tr mono">${fc(item.tax || 0, stmt.cur)}</td>
      ${hasCrf ? `<td class="tr mono">${fc(item.crfRdf || 0, stmt.cur)}</td>` : ''}

      <td>${esc(item.srcFile || '')}</td>
      <td class="tr mono">${item.srcPage || ''}</td>

  return `
    <details>
      <summary>${t('detail_items')} (${stmt.li.length})</summary>
      <div class="filter-row">
        ${invoices.map((inv, index) => `<button class="btn btn-s ${index === 0 ? 'a' : ''}" onclick="fD('${safeId}','${esc(inv)}',this)">${esc(inv)}</button>`).join('')}
        <button class="btn btn-s" onclick="fD('${safeId}','ALL',this)">All</button>
      </div>
      <div class="tw">
        <table id="${safeId}">
          <thead>
            <tr>
              <th>${t('invoice')}</th>
              <th>${t('tranche')}</th>
              <th>${t('product')}</th>
              <th>${t('name')}</th>
              <th class="tr">${t('qty')}</th>
              <th class="tr">${t('unit_price')}</th>
              <th class="tr">${t('charges')}</th>
              <th class="tr">${t('tax')}</th>
              ${hasCrf ? '<th class="tr">CRF/RDF</th>' : ''}
              <th class="tr">${t('total')}</th>
              <th>${t('file')}</th>
              <th class="tr">${t('page')}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </details>
  `;
}

function renderValidationList(stmt) {
  const issueCount = stmt.vr.filter(check => check.sv === 'f').length;
  const checks = stmt.vr.map(check => `
    <div class="vi">
      <span class="vc ${check.sv === 'p' ? 'p' : check.sv === 'f' ? 'f' : 'w'}">
        ${check.sv === 'p' ? 'OK' : check.sv === 'f' ? 'ERR' : 'WARN'}
      </span>
      <div>
        <div><strong>${esc(check.nm)}</strong></div>
        <div class="td">${esc(check.dt)}</div>
      </div>
    </div>
  `).join('');

  return `
    <details ${issueCount ? 'open' : ''}>
      <summary>${t('validation')} (${stmt.vr.length} ${t('checks')}, ${issueCount} ${t('issues')})</summary>
      <div class="validation-list">${checks}</div>
    </details>
  `;
}

function renderHierarchy() {
  const rows = [];
  for (const code of Object.keys(analysisResults).sort()) {
    const group = analysisResults[code];
    const invCount = group.stmts.reduce((sum, stmt) => sum + stmt.bs.length, 0);
    const itemCount = group.stmts.reduce((sum, stmt) => sum + stmt.li.length, 0);
    const chargeTotal = group.stmts.reduce((sum, stmt) => sum + stmt.dGT.charges, 0);
    const taxTotal = group.stmts.reduce((sum, stmt) => sum + stmt.dGT.tax, 0);
    const grandTotal = group.stmts.reduce((sum, stmt) => sum + stmt.dGT.total, 0);
    const issueCount = group.stmts.reduce((sum, stmt) => sum + stmt.vr.filter(check => check.sv === 'f').length, 0);
    rows.push(`
      <tr>
        <td>${esc(group.meta.flag)} ${esc(group.meta.label)} (${esc(code)})</td>
        <td class="tr mono">${invCount}</td>
        <td class="tr mono">${itemCount}</td>
        <td class="tr mono">${fc(chargeTotal, group.meta.cur)}</td>
        <td class="tr mono">${fc(taxTotal, group.meta.cur)}</td>
        <td class="tr mono">${fc(grandTotal, group.meta.cur)}</td>
        <td class="tr mono ${issueCount ? 'tre' : 'tg'}">${issueCount}</td>
      </tr>
    `);
  }
  return `
    <div class="tb">
      <div><strong>${t('hierarchy')}</strong></div>
      <div class="td">Country -> Statements</div>
    </div>
    <div class="tw">
      <table>
        <thead>
          <tr>
            <th>${t('hierarchy')}</th>
            <th class="tr">${t('invoices')}</th>
            <th class="tr">${t('items')}</th>
            <th class="tr">${t('charges')}</th>
            <th class="tr">${t('tax')}</th>
            <th class="tr">${t('total')}</th>
            <th class="tr">${t('issues')}</th>
          </tr>
        </thead>
        <tbody>${rows.join('')}</tbody>
      </table>
    </div>
  `;
}

function swC(code) {
  document.querySelectorAll('.gc').forEach(card => card.classList.remove('a'));
  document.getElementById(`gc-${code}`)?.classList.add('a');
}

function swTab(id) {
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('a'));
  document.getElementById(`tab-${id}`)?.classList.add('a');
  document.querySelectorAll('.tp').forEach(panel => panel.classList.remove('a'));
  document.getElementById(`tp-${id}`)?.classList.add('a');
}

function swSub(code, index, total) {
  for (let i = 0; i < total; i++) {
    document.getElementById(`sc-${code}-${i}`)?.classList.toggle('a', i === index);
    document.getElementById(`sc-${code}-p-${i}`)?.classList.toggle('a', i === index);
  }
}

function fD(safeId, invoice, btn) {
  const table = document.getElementById(safeId);
  if (!table) return;
  btn.parentElement.querySelectorAll('.btn').forEach(button => button.classList.remove('a'));
  btn.classList.add('a');
  table.querySelectorAll('tbody tr').forEach(row => {
    row.style.display = invoice === 'ALL' || row.dataset.inv === invoice ? '' : 'none';
  });
}

window.swC = swC;
window.swTab = swTab;
window.swSub = swSub;
window.fD = fD;

function doExport() {
  if (!analysisResults) return;
  const wb = XLSX.utils.book_new();
  const statements = Object.values(analysisResults).flatMap(group => group.stmts);
  const summaryRows = [[
    'File',
    'Country',
    'Statement',
    'Customer',
    'Invoices',
    'Line Items',
    'Issues'
  ]];
  const detailRows = [[
    'File',
    'Country',
    'Statement',
    'Invoice',
    'Tranche',
    'PID',
    'Name',
    'Qty',
    'Unit Price',
    'Charges',
    'Tax',
    'Total',
    'Page'
  ]];

  for (const stmt of statements) {
    summaryRows.push([
      stmt.fileName,
      stmt.country,
      stmt.hd.stmtNum,
      stmt.hd.custName || stmt.hd.custNum || '',
      stmt.bs.length,
      stmt.li.length,
      stmt.vr.filter(check => check.sv === 'f').length,
    ]);
    for (const item of stmt.li) {
      detailRows.push([
        stmt.fileName,
        stmt.country,
        stmt.hd.stmtNum,
        item.inv,
        item.tranche || '',
        item.pid || '',
        item.pname || '',
        item.qty ?? '',
        item.up ?? '',
        item.charges ?? '',
        item.tax ?? '',
        item.total ?? '',
        item.srcPage ?? '',
      ]);
    }
  }

  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryRows), 'Summary');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(detailRows), 'Detail');
  XLSX.writeFile(wb, `invoice_validator_export_${VERSION}.xlsx`);
}

window.addFiles = addFiles;
window.clearAll = clearAll;
window.doExport = doExport;
window.removeFile = removeFile;
window.runAll = runAll;</script>
