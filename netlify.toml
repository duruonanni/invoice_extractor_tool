[build]
  command = "npm run web:build"
  publish = "dist-web"

[functions]
  directory = "netlify/functions"

# Local auth parity: serve the production Vite build while Netlify proxies
# Functions and Identity on the same local origin.
[dev]
  command = "npm run web:preview"
  targetPort = 4173
  publish = "dist-web"
  autoLaunch = false
